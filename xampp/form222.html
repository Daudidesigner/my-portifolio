<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Creative Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4b59f7,#6a75ff);
}

.form-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:95%;
    max-width:400px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.form-box h1{
    margin-bottom:10px;
    color:#4b59f7;
}

.form-box p{
    font-size:0.9rem;
    margin-bottom:25px;
    color:#666;
}

input[type="text"]{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

.photo-upload{
    margin-bottom:20px;
}

.photo-upload img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #4b59f7;
    cursor:pointer;
}

input[type="file"]{display:none;}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4b59f7;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.2s;
}

button:hover{background:#1f3cd0;}
</style>
</head>
<body>

<div class="form-box">
    <h1>Creative Hub</h1>
    <p>Set up your profile to enter the collaboration dashboard</p>

    <input type="text" id="username" placeholder="Enter your username" required>

    <div class="photo-upload">
        <label for="photoInput">
            <img id="photoPreview" src="https://via.placeholder.com/90" alt="Upload Photo">
        </label>
        <input type="file" id="photoInput" accept="image/*">
    </div>

    <button onclick="enterDashboard()">Enter Dashboard</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqSxgQCsUFgIz7eetzb2MMbO_DkHN2Zu8",
    authDomain: "my-portifolio-3f4c5.firebaseapp.com",
    projectId: "my-portifolio-3f4c5",
    storageBucket: "my-portifolio-3f4c5.firebasestorage.app",
    messagingSenderId: "1036053397124",
    appId: "1:1036053397124:web:3bdfea641c319d176a0cd1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let photoData = "";
  let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    // Check if already completed setup
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists() && userDoc.data().setupComplete === true) {
      // Already done → skip to dashboard
      window.location.href = "dashboard.html";
    }
  } else {
    // Not logged in → back to login
    window.location.href = "Login1.html";
  }
});
    
  // Monitor Auth State (Ensure user is logged in)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
    } else {
      // If someone tries to access this page without logging in, send them back
      window.location.href = "Login1.html";
    }
  });

  // Handle Photo Preview
  document.getElementById("photoInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
      photoData = reader.result;
      document.getElementById("photoPreview").src = photoData;
    }
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  });

  // Save to Firebase and Enter Dashboard
  window.enterDashboard = async function() {
    const username = document.getElementById("username").value.trim();
    
    if(username === "" || photoData === ""){
      alert("Please enter username and upload a photo.");
      return;
    }

    if(!currentUser) {
      alert("Session expired. Please login again.");
      return;
    }

    try {
      // SAVE TO FIRESTORE
      // This is the "Flag" that Login1.html will check for next time
      await setDoc(doc(db, "users", currentUser.uid), {
        username: username,
        profilePhoto: photoData, // Base64 string
        email: currentUser.email,
        setupComplete: true,
        createdAt: new Date()
      });

      // Also keep in localStorage for fast loading on dashboard
      localStorage.setItem("creativeHubUser", username);
      localStorage.setItem("creativeHubPhoto", photoData);

      window.location.href = "dashboard.html";
    } catch (error) {
      console.error("Error saving profile:", error);
      alert("Failed to save profile. Try again.");
    }
  }
</script>

</body>
</html>
