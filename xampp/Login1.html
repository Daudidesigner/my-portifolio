<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login page</title>
        <meta charset="UTF-8">
        <link rel="icon" href="1ct3.jpg" type="image/x-icon">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <style>
        body{
            text-align: center;
            padding: 50px;
            justify-items: center;
            font-family:Arial, Helvetica, sans-serif;
            background-image: url('backc4.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: top;
            min-height: 100vh;
        }
        section{
            background-color: #ccc;
            padding:60.5px;
            border-radius: 50px;
        }
        div{
            background-color: #ddd;
            padding: 24.6px;
            border-radius: 40px;
        }
        input{
            border-radius: 10px;
            border: none;
            padding:10px;
        }
        #login{
            background-color: blue;
            color:white;
            cursor:pointer;
        }
        #login:hover{
            background-color: rgb(135, 135, 173);
            color:red;
        }
           @media (max-width: 500px) {
            section {
                padding: 1.5rem;
            }
            div {
                padding: 1rem;
            }
            #login {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }
    </style>
    <body>
        <section>
            <h2>Welcome Again</h2>
    <div>
        <form action="form222.html" id="login-form">
            <label for="name">Username</label><br>
            <input type="text" id="name" name="name" placeholder="name/email/phone-number" required><br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" minlength="8" maxlength="32" required><br><br>
            <input type="submit" id="login" value="Login">
        </form>
    </div>
    <p><a href="forget password.html">Forget Password?</a></p>
    <p>You don't have Account <a href="Sign up page.html">Sign up</a> </p>
        </section>
     
        <!-- Firebase SDKs for plain HTML/JS -->
<script type="module">
  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    query,
    collection,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqSxgQCsUFgIz7eetzb2MMbO_DkHN2Zu8",
    authDomain: "my-portifolio-3f4c5.firebaseapp.com",
    projectId: "my-portifolio-3f4c5",
    storageBucket: "my-portifolio-3f4c5.firebasestorage.app",
    messagingSenderId: "1036053397124",
    appId: "1:1036053397124:web:3bdfea641c319d176a0cd1",
    measurementId: "G-MLBNWNV99Y"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  console.log("Firebase initialized successfully");

  const loginForm = document.getElementById('login-form');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value;

    console.log("=== Login Attempt Started ===");
    console.log("Input:", loginInput);
    console.log("Password length:", password.length);

    let emailToUse = "";

    try {
      // Step 1: Find real email
      if (loginInput.includes('@') && loginInput.includes('.')) {
        emailToUse = loginInput;
        console.log("Using direct email:", emailToUse);
      } else {
        console.log("Searching Firestore for username or phone:", loginInput);

        // Try username
        let q = query(collection(db, "users"), where("username", "==", loginInput));
        let snapshot = await getDocs(q);

        if (snapshot.empty) {
          console.log("No username match → trying phone");
          q = query(collection(db, "users"), where("telphone", "==", loginInput));
          snapshot = await getDocs(q);
        }

        if (snapshot.empty) {
          console.log("No match found in Firestore");
          alert("User not found. Please check username, email or phone number.");
          return;
        }

        snapshot.forEach((docSnap) => {
          emailToUse = docSnap.data().email;
          console.log("Found email:", emailToUse, "from doc:", docSnap.id);
        });
      }

      if (!emailToUse) {
        console.log("No email could be determined");
        alert("Could not find email for this input.");
        return;
      }

      // Step 2: Attempt sign-in
      console.log("Attempting sign-in with:", emailToUse);
      const userCredential = await signInWithEmailAndPassword(auth, emailToUse, password);
      const user = userCredential.user;

      console.log("LOGIN SUCCESS! UID:", user.uid);
      console.log("Email verified:", user.emailVerified);

      // Step 3: Check profile setup
      console.log("Checking Firestore for user profile...");
      const userDocRef = doc(db, "users", user.uid);
      const userDoc = await getDoc(userDocRef);

      if (userDoc.exists()) {
        const data = userDoc.data();
        console.log("Firestore data:", data);
        console.log("setupComplete value:", data.setupComplete);

        if (data.setupComplete === true) {
          console.log("Profile COMPLETE → going to dashboard");
          alert("Welcome back!");
          window.location.href = "dashboard.html";
        } else {
          console.log("Profile NOT complete → going to form222");
          alert("Please complete your profile setup first.");
          window.location.href = "form222.html";
        }
      } else {
        console.log("No Firestore document found for this UID");
        alert("Profile not found. Please complete setup.");
        window.location.href = "form222.html";
      }

    } catch (err) {
      console.error("LOGIN ERROR:", err.code, err.message);
      let msg = "Login failed. Please try again.";

      switch (err.code) {
        case 'auth/wrong-password':
          msg = "Incorrect password.";
          break;
        case 'auth/user-not-found':
        case 'auth/invalid-email':
          msg = "No account found with this email.";
          break;
        case 'auth/invalid-credential':
          msg = "Invalid login credentials.";
          break;
        case 'auth/too-many-requests':
          msg = "Too many failed attempts. Try again later or reset password.";
          break;
        case 'auth/network-request-failed':
          msg = "Network error. Check your internet connection.";
          break;
        default:
          msg = "Login failed: " + (err.message || "Unknown error");
      }

      alert(msg);
      console.error("Full error object:", err);
    }
  });
</script>

</body>

</html>
