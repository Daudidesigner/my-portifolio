<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login page</title>
        <meta charset="UTF-8">
        <link rel="icon" href="1ct3.jpg" type="image/x-icon">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <style>
        body{
            text-align: center;
            padding: 50px;
            justify-items: center;
            font-family:Arial, Helvetica, sans-serif;
            background-image: url('backc4.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: top;
            min-height: 100vh;
        }
        section{
            background-color: #ccc;
            padding:60.5px;
            border-radius: 50px;
        }
        div{
            background-color: #ddd;
            padding: 24.6px;
            border-radius: 40px;
        }
        input{
            border-radius: 10px;
            border: none;
            padding:10px;
        }
        #login{
            background-color: blue;
            color:white;
            cursor:pointer;
        }
        #login:hover{
            background-color: rgb(135, 135, 173);
            color:red;
        }
           @media (max-width: 500px) {
            section {
                padding: 1.5rem;
            }
            div {
                padding: 1rem;
            }
            #login {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }
    </style>
    <body>
        <section>
            <h2>Welcome Again</h2>
    <div>
        <form action="form222.html" id="login-form">
            <label for="name">Username</label><br>
            <input type="text" id="name" name="name" placeholder="name/email/phone-number" required><br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" minlength="8" maxlength="32" required><br><br>
            <input type="submit" id="login" value="Login">
        </form>
    </div>
    <p><a href="forget password.html">Forget Password?</a></p>
    <p>You don't have Account <a href="Sign up page.html">Sign up</a> </p>
        </section>
     
        <!-- Firebase SDKs for plain HTML/JS -->
<script type="module">
  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    query,
    collection,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqSxgQCsUFgIz7eetzb2MMbO_DkHN2Zu8",
    authDomain: "my-portifolio-3f4c5.firebaseapp.com",
    projectId: "my-portifolio-3f4c5",
    storageBucket: "my-portifolio-3f4c5.firebasestorage.app",
    messagingSenderId: "1036053397124",
    appId: "1:1036053397124:web:3bdfea641c319d176a0cd1",
    measurementId: "G-MLBNWNV99Y"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginForm = document.getElementById('login-form');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value;
    let emailToUse = "";

    console.log("Login attempt with input:", loginInput);

    try {
      // Step 1: Find real email from username / phone / email
      if (loginInput.includes('@') && loginInput.includes('.')) {
        // Direct email
        emailToUse = loginInput;
        console.log("Using direct email:", emailToUse);
      } else {
        // Try username first
        let q = query(collection(db, "users"), where("username", "==", loginInput));
        let snapshot = await getDocs(q);

        if (snapshot.empty) {
          // Try phone number
          q = query(collection(db, "users"), where("telphone", "==", loginInput));
          snapshot = await getDocs(q);
        }

        if (snapshot.empty) {
          alert("User not found. Check username, email or phone number.");
          console.log("No matching user found for:", loginInput);
          return;
        }

        // Take the email from the first matching document
        snapshot.forEach((docSnap) => {
          emailToUse = docSnap.data().email;
          console.log("Found email from Firestore:", emailToUse);
        });
      }

      if (!emailToUse) {
        alert("Could not find email for this login input.");
        return;
      }

      // Step 2: Sign in with Firebase Auth
      const userCredential = await signInWithEmailAndPassword(auth, emailToUse, password);
      const user = userCredential.user;

      console.log("Login success! User UID:", user.uid);

      // Step 3: Check if profile setup is already complete
      const userDocRef = doc(db, "users", user.uid);
      const userDoc = await getDoc(userDocRef);

      if (userDoc.exists() && userDoc.data().setupComplete === true) {
        // Already set up → go directly to dashboard
        console.log("Profile already complete → skipping form222");
        alert("Welcome back!");
        window.location.href = "dashboard.html";
      } else {
        // Needs setup → go to form222
        console.log("Profile not complete → redirecting to form222");
        alert("Please complete your profile setup first.");
        window.location.href = "form222.html";
      }

    } catch (err) {
      console.error("Login error:", err.code, err.message);

      let msg = "Login failed. Please try again.";
      if (err.code === 'auth/wrong-password') msg = "Incorrect password.";
      if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-email') msg = "No account found with this email.";
      if (err.code === 'auth/too-many-requests') msg = "Too many attempts. Try again later.";
      alert(msg);
    }
  });
</script>

</body>

</html>
